name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      CARGO_NET_RETRY: 5
      CARGO_HTTP_TIMEOUT: "120"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend deps
        run: npm ci

      - name: Cache Tauri AppImage tools
        uses: actions/cache@v4
        with:
          # Tauri downloads AppRun + linuxdeploy into ~/.cache/tauri (see
          # tauri-bundler/src/bundle/linux/appimage/linuxdeploy.rs). The
          # bundler checks if the file exists before downloading, so caching
          # the whole dir lets us skip the github.com download and survive
          # transient 504s on tauri-apps/binary-releases.
          path: ~/.cache/tauri
          key: tauri-appimage-tools-ubuntu-22.04-x86_64-v1
          restore-keys: |
            tauri-appimage-tools-ubuntu-22.04-x86_64-

      - name: Build
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    env:
      CARGO_NET_RETRY: 5
      CARGO_HTTP_TIMEOUT: "120"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --bundles dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    env:
      CARGO_NET_RETRY: 5
      CARGO_HTTP_TIMEOUT: "120"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Build
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Display downloaded files
        run: find . -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            linux-bundle/**/*
            macos-bundle/**/*
            windows-bundle/**/*
          generate_release_notes: true
